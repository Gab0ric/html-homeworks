!<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form
      action="#"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        margin-top: 300px;
      "
    >
      <input type="text" id="username" required placeholder="Username" />
      <input
        type="email"
        id="email"
        required
        placeholder="Enter your email address"
      />
      <input type="password" id="password" required placeholder="password" />
      <input
        type="password"
        id="confirmpassword"
        required
        placeholder="Confirm password"
      />
      <div>
        <input
          type="submit"
          value="Register"
          style="background-color: rgb(45, 81, 10); color: white; border: none"
        />
        <input
          type="reset"
          value="Clear"
          style="background-color: brown; color: white; border: none"
        />
      </div>
    </form>
  </body>
</html>
